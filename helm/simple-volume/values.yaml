image:
  repository: ghcr.io/shipstuff/simple-volume
  tag: "0.3.0"
  pullPolicy: IfNotPresent

namespaceOverride: ""

controller:
  replicas: 1
  service:
    create: true
    name: ""
    port: 8080
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
  provisionerImage: registry.k8s.io/sig-storage/csi-provisioner:v5.2.0
  replicationController:
    enabled: true
    reconcileInterval: 30s
    failoverTimeout: 10s

rbacProxy:
  enabled: true
  image: quay.io/brancz/kube-rbac-proxy:v0.22.0
  listenAddress: 0.0.0.0:8082
  upstream: http://127.0.0.1:8080/
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      memory: 64Mi

node:
  resources: {}
  agent:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
  csiNode:
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        memory: 64Mi
  registrar:
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        memory: 64Mi
  registrarImage: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.13.0
  nodeSelector: {}
  tolerations: []
  affinity: {}

storagePools:
  - name: default
    path: /var/lib/simple-volume
    defaultReplicaCount: 2
    allowNonEmpty: false

storageClass:
  create: true
  name: simple-volume
  reclaimPolicy: Retain
  volumeBindingMode: WaitForFirstConsumer
  allowVolumeExpansion: true

sync:
  tokenSecretName: simple-volume-sync-token
  tokenSecretKey: token
  token: "change-me"

replication:
  webdav:
    enabled: true
    port: 8081
  watch:
    debounce: 5s
  fullResyncSchedule: "0 4 * * *"

networkPolicy:
  enabled: false

serviceAccount:
  create: true
  name: ""
