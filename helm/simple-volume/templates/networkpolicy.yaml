{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "simple-volume.fullname" . }}-agents
  namespace: {{ include "simple-volume.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "simple-volume.name" . }}
      app.kubernetes.io/component: node
      app.kubernetes.io/instance: {{ .Release.Name }}
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "simple-volume.name" . }}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: {{ .Values.replication.webdav.port }}
  policyTypes:
    - Ingress
{{- end }}
