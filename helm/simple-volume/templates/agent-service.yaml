apiVersion: v1
kind: Service
metadata:
  name: {{ include "simple-volume.fullname" . }}-agent
  namespace: {{ include "simple-volume.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "simple-volume.name" . }}
    app.kubernetes.io/component: node
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "simple-volume.name" . }}
    app.kubernetes.io/component: node
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: http

