apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: simple-volume-demo
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: simple-volume
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-volume-demo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-volume-demo
  template:
    metadata:
      labels:
        app: simple-volume-demo
    spec:
      containers:
        - name: demo
          image: busybox:1.36
          command: ["/bin/sh", "-c", "date >> /data/heartbeat.log; sleep 3600"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: simple-volume-demo

